name: Update site (ingest -> bridge -> resolve -> rebuild)

# The full live loop. Runs daily on a schedule (enabled after a verified clean
# manual run) and on-demand via workflow_dispatch (the "Run workflow" button).
# Safe to run unattended: test gate + secret guard + job timeout all precede any push.
on:
  workflow_dispatch:
  schedule:
    # GitHub's schedule trigger is BEST-EFFORT: under load it delays runs by up to a
    # few hours and sometimes DROPS them entirely. A single daily cron therefore can't
    # be trusted to actually fire. We fan out across three windows hours apart so a
    # correlated drop on one window is unlikely to take all three. This is safe to do
    # because the job is IDEMPOTENT -- "Commit on change" only pushes when data actually
    # changed, and the concurrency group below serialises overlapping runs -- so the
    # extra windows simply no-op (warm ingest ~1s, dedup bounds NIM) when nothing's new.
    - cron: '17 6 * * *'    # 06:17 UTC (primary; off the top-of-hour cron stampede)
    - cron: '17 11 * * *'   # 11:17 UTC (backup if the morning window is dropped)
    - cron: '17 16 * * *'   # 16:17 UTC (final backup)

# Least privilege: the job only needs to push the rebuilt site + resolved CSVs.
permissions:
  contents: write

# Never let two runs write deals.csv / docs at once.
concurrency:
  group: update-site
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # Unattended safety: a hung run (stuck NIM call / hanging feed) must die fast.
    # With concurrency cancel-in-progress:false, a hang would otherwise sit in the
    # queue and block every following day's run -- silently killing the cron. A clean
    # run is ~10 min; 20 gives headroom while capping a true hang well under GitHub's
    # 6h default.
    timeout-minutes: 20
    # Job-level so BOTH ingest (engine.run.analyze) and resolve (outcome.source)
    # see the NIM key. Setting it per-step is the easy way to leave ingest keyless.
    env:
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      # Gate: never auto-write data or rebuild the site from broken code.
      - name: Run tests
        run: pytest -q

      # Persist the ingest DB across runs so re-ingestion only extracts NEW headlines
      # (dedup is on post URL, before the expensive NIM call). The cache holds only
      # public RSS-derived claims -- never the API key -- so it's a safe artifact.
      # Keyed per-run so each run saves a fresh snapshot; restore-keys grabs the most
      # recent previous one.
      - name: Restore ingest cache
        uses: actions/cache@v4
        with:
          path: ingest/ingest.db
          key: ingest-db-v1-${{ github.run_id }}
          restore-keys: |
            ingest-db-v1-

      # 1. Pull live RSS, extract structured claims (NIM, concurrent), cluster by player.
      - name: Ingest live feeds
        run: python ingest/pipeline.py

      # 2. Turn new player clusters into proposed deals.csv rows (verified=auto).
      - name: Bridge clusters to deals
        run: python ingest/bridge.py

      # 3. Resolve any 'unknown' deals whose window has closed (positive-evidence only).
      - name: Resolve outcomes
        run: python outcome/apply.py

      # 4. Rebuild both static pages: leaderboard (scored) + live feed (current snapshot).
      - name: Rebuild site
        run: |
          python scoring/score.py ground-truth/journalist_claims.csv
          python site/build_leaderboard.py
          python site/build_feed.py

      # Defense in depth: fail loudly if anything resembling a NIM key ever lands
      # in a tracked file. (.github excluded so this guard can't match itself.)
      - name: Guard - no leaked secrets in tracked files
        run: |
          if git grep -nI -E 'nvapi-[A-Za-z0-9_-]{10,}' -- . ':!.github'; then
            echo "::error::Possible API key found in a tracked file"; exit 1
          fi

      - name: Commit on change
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name  "transfer-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add ground-truth/deals.csv docs/ scoring/leaderboard.json
            git commit -m "chore: live update (ingest+resolve+rebuild) [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
