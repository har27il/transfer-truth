name: Update site (ingest -> bridge -> resolve -> rebuild)

# The full live loop. Runs daily on a schedule (enabled after a verified clean
# manual run) and on-demand via workflow_dispatch (the "Run workflow" button).
# Safe to run unattended: test gate + secret guard + job timeout all precede any push.
on:
  workflow_dispatch:
    inputs:
      backfill_since:
        description: 'Re-extract claim-less posts since this date (YYYY-MM-DD, blank = skip). Recovery tool: the ingest DB only exists in the Actions cache.'
        required: false
        default: ''
      backfill_limit:
        description: 'Posts per backfill batch (blank = 60). Sized so backfill time + ~15 min pipeline stays inside the 30-min job cap: ~170 max on a healthy endpoint.'
        required: false
        default: ''
  schedule:
    # GitHub's schedule trigger is BEST-EFFORT: under load it delays runs by up to a
    # few hours and sometimes DROPS them entirely. A single daily cron therefore can't
    # be trusted to actually fire. We fan out across three windows hours apart so a
    # correlated drop on one window is unlikely to take all three. This is safe to do
    # because the job is IDEMPOTENT -- "Commit on change" only pushes when data actually
    # changed, and the concurrency group below serialises overlapping runs -- so the
    # extra windows simply no-op (warm ingest ~1s, dedup bounds NIM) when nothing's new.
    - cron: '17 6 * * *'    # 06:17 UTC (primary; off the top-of-hour cron stampede)
    - cron: '17 11 * * *'   # 11:17 UTC (backup if the morning window is dropped)
    - cron: '17 16 * * *'   # 16:17 UTC (final backup)

# Least privilege: the job only needs to push the rebuilt site + resolved CSVs.
permissions:
  contents: write

# Never let two runs write deals.csv / docs at once.
concurrency:
  group: update-site
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # Unattended safety: a hung run (stuck NIM call / hanging feed) must die fast.
    # With concurrency cancel-in-progress:false, a hang would otherwise sit in the
    # queue and block every following day's run -- silently killing the cron.
    # 30 min: the reasoning default (nemotron) is slower per call than the old
    # instruct model and a backfill batch adds ~5 min; 2026-07-05 a productive
    # recovery run was cancelled at 20 right before its commit step. Still caps
    # a true hang well under GitHub's 6h default.
    timeout-minutes: 30
    # Least privilege: the NIM key is scoped per-step (only Ingest + Resolve call NIM),
    # NOT job-level -- so checkout / setup-python / pip install / pytest / cache never
    # carry it in their environment. This is hygiene, not the load-bearing control:
    # the real protection is the trigger surface above (schedule + workflow_dispatch
    # only, no pull_request), so no untrusted code ever runs in this job to read it.
    # If you add a NIM-calling step, give THAT step the env block too -- both keyed
    # steps below throw loudly without it (engine/run.py:59, outcome/source.py:200).
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      # Gate: never auto-write data or rebuild the site from broken code.
      - name: Run tests
        run: pytest -q

      # Persist the ingest DB across runs so re-ingestion only extracts NEW headlines
      # (dedup is on post URL, before the expensive NIM call). The cache holds only
      # public RSS-derived claims -- never the API key -- so it's a safe artifact.
      # Keyed per-run so each run saves a fresh snapshot; restore-keys grabs the most
      # recent previous one.
      - name: Restore ingest cache
        uses: actions/cache@v4
        with:
          path: ingest/ingest.db
          key: ingest-db-v1-${{ github.run_id }}
          restore-keys: |
            ingest-db-v1-

      # 1. Pull live RSS, extract structured claims (NIM, concurrent), cluster by player.
      # NIM_TIMEOUT: free-tier serverless endpoints queue under load; the 30s
      # client default timed out 60/60 calls on 2026-07-05. 90s rides out the
      # queue while ceil(60 posts / 6 workers) x 90s stays under the job cap.
      - name: Ingest live feeds
        run: python ingest/pipeline.py
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NIM_TIMEOUT: '90'

      # 1b. Optional recovery: re-run claim-less posts (e.g. a broken-model week)
      # through the normal pipeline. Only runs when the dispatch input is set.
      # Throttled (batch of 60, 4 concurrent): the first recovery attempt
      # 429-stormed the free tier at ~200 posts x 6 workers; concurrency 1 then
      # proved too slow for a reasoning model inside the job timeout (a run was
      # cancelled pre-commit). Dispatch repeatedly until the log says "0 remaining".
      - name: Backfill claim-less posts
        if: ${{ github.event.inputs.backfill_since != '' }}
        run: python ingest/backfill.py --since "${{ github.event.inputs.backfill_since }}" --limit "${{ github.event.inputs.backfill_limit || '60' }}"
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NIM_CONCURRENCY: '4'
          NIM_TIMEOUT: '90'

      # 2. Turn new player clusters into proposed deals.csv rows (verified=auto).
      - name: Bridge clusters to deals
        run: python ingest/bridge.py

      # 3. Resolve any 'unknown' deals whose window has closed (positive-evidence only).
      - name: Resolve outcomes
        run: python outcome/apply.py
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NIM_TIMEOUT: '90'

      # 4. Rebuild both static pages: leaderboard (scored) + live feed (current snapshot).
      - name: Rebuild site
        run: |
          python scoring/score.py ground-truth/journalist_claims.csv
          python site/build_leaderboard.py
          python site/build_feed.py

      # Defense in depth: fail loudly if anything resembling a NIM key ever lands
      # in a tracked file. (.github excluded so this guard can't match itself.)
      - name: Guard - no leaked secrets in tracked files
        run: |
          if git grep -nI -E 'nvapi-[A-Za-z0-9_-]{10,}' -- . ':!.github'; then
            echo "::error::Possible API key found in a tracked file"; exit 1
          fi

      - name: Commit on change
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name  "transfer-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add ground-truth/deals.csv ground-truth/journalist_claims.csv docs/ scoring/leaderboard.json
            git commit -m "chore: live update (ingest+resolve+rebuild) [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
